<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ops System - Brasa do Chefe</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0f1a">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161b2a; --primary: #fbbf24; --secondary: #10b981; --accent: #38bdf8; --text: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: var(--card); border-radius: 20px; border: 1px solid #2d3748; box-shadow: 0 10px 40px rgba(0,0,0,0.6); overflow: hidden; }
        .header { background: #1a202e; padding: 20px; text-align: center; border-bottom: 3px solid var(--primary); }
        .header h1 { color: var(--primary); font-size: 1.1rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .content { padding: 15px; }
        .section-title { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin: 25px 0 10px 0; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: rgba(56,189,248,0.2); }
        label { font-size: 0.8rem; color: #94a3b8; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; font-size: 16px; box-sizing: border-box; }
        
        /* Melhoria no campo de arquivo */
        .file-input-wrapper {
            position: relative;
            margin-top: 10px;
        }
        input[type="file"] {
            background: #1e293b;
            border: 2px dashed var(--accent);
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .doc-group { background: rgba(15, 23, 42, 0.4); padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--primary); }
        .input-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn-add { background: transparent; color: var(--accent); border: 1px dashed var(--accent); padding: 8px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .btn-remove { background: #ef4444; color: white; border: none; border-radius: 8px; width: 40px; cursor: pointer; }
        .status-box { background: #1e293b; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #334155; }
        .hidden { display: none; }
        .btn-send { background: linear-gradient(135deg, var(--secondary) 0%, #059669 100%); color: white; border: none; padding: 20px; width: 100%; border-radius: 15px; font-size: 1rem; font-weight: 800; margin-top: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>OPERATIONS DASHBOARD</h1></div>
        <div class="content">
            <div class="grid-2">
                <div><label>Cidade:</label><input type="text" id="cidade" value="Águas Lindas"></div>
                <div><label>Data:</label><input type="date" id="data"></div>
            </div>

            <div class="section-title">Equipe & Projeto</div>
            <div class="grid-2">
                <div><label>Equipe:</label><select id="equipe"><option value="">Selecione</option><option>AGLO001M</option><option>AGLO002M</option><option>AGLO003M</option><option>AGLO004M</option><option>AGLO005M</option><option>AGLO006M</option><option>AGLV001M</option><option>AGLB001M</option><option>AGLV002M</option><option>AGLV003M</option><option>AGLP001M</option></select></div>
                <div><label>Nº Projeto:</label><input type="text" id="projeto"></div>
            </div>

            <label>Encarregado:</label>
            <select id="encarregado"><option value="">Selecione</option><option>MOURES SANTANA GONÇALVES DE ABREU</option><option>JOSE LUIZ DE MELO SOUZA</option><option>JOÃO PAULO TEXEIRA NASCIMENTO</option><option>LAZARO JOSE DO CARMO NASCIMENTO</option><option>MOISES VANIR LEITE DA SILVA</option><option>JOÃO BATISTA RODRIGUES DA SILVA</option><option>JOSUEL AFONSO ALVES</option><option>ELIAVAM PATRICIO</option><option>JOÃO ALVES NOGUEIRA</option><option>JOSE CARVALHO SOUZA</option><option>CLAUDEMIR FRANCISCO DOS SANTOS</option></select>

            <div class="doc-group" id="group-integrantes"><label>Integrantes:</label><div class="container-inputs"></div><button class="btn-add" onclick="addInput('group-integrantes', 'Integrante')">+ ADD INTEGRANTE</button></div>

            <div class="section-title">Documentação Técnica</div>
            <label>Tensão:</label><select id="tensao"><option>BT</option><option>13.8KV</option><option>34.5KV</option></select>

            <div class="grid-2">
                <div class="doc-group" id="group-SI"><div class="container-inputs"></div><button class="btn-add" onclick="addInput('group-SI', 'SI')">+ SI</button></div>
                <div class="doc-group" id="group-PTP"><div class="container-inputs"></div><button class="btn-add" onclick="addInput('group-PTP', 'PTP')">+ PTP</button></div>
            </div>
            <div class="grid-2">
                <div class="doc-group" id="group-OC"><div class="container-inputs"></div><button class="btn-add" onclick="addInput('group-OC', 'OC')">+ OC</button></div>
                <div class="doc-group" id="group-OSE"><div class="container-inputs"></div><button class="btn-add" onclick="addInput('group-OSE', 'OSE')">+ OSE</button></div>
            </div>


            <div class="status-box">
                <label>Status:</label><select id="status" onchange="toggleParcial()"><option value="CONCLUÍDO">✅ CONCLUÍDO</option><option value="PARCIAL">⚠️ PARCIAL</option></select>
                <div id="descParcial" class="hidden"><label>Pendência:</label><textarea id="obsParcial" rows="2"></textarea></div>
            </div>

            <label>Serviços:</label><textarea id="servicos" rows="3"></textarea>

            <!-- AQUI ESTÁ O SEGREDO -->
            <label>Mídia (Foto/Vídeo):</label>
            <div class="file-input-wrapper">
                <input type="file" id="midia" multiple accept="image/*,video/*">
            </div>
            <p style="font-size: 11px; color: #94a3b8; margin-top: 5px;">
                💡 Se não abrir a câmera, verifique se o site está usando <b>HTTPS</b> e se as permissões de câmera do navegador estão ativas.
            </p>

            <button class="btn-send" onclick="gerarEEnviar()">🚀 TRANSMITIR PARA WHATSAPP</button>
        </div>
    </div>

<script>
    document.getElementById('data').valueAsDate = new Date();

    function addInput(groupId, label) {
        const container = document.querySelector(`#${groupId} .container-inputs`);
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `<input type="text" class="doc-input" data-type="${label}" placeholder="${label}"><button class="btn-remove" onclick="this.parentElement.remove()">X</button>`;
        container.appendChild(div);
    }

    function toggleParcial() {
        const status = document.getElementById('status').value;
        document.getElementById('descParcial').className = status === 'PARCIAL' ? '' : 'hidden';
    }

    async function gerarEEnviar() {
        const zip = new JSZip();
        const d = (id) => document.getElementById(id).value;
        const arquivos = document.getElementById('midia').files;

        if (!d('equipe') || !d('encarregado')) { alert("Preencha Equipe e Encarregado!"); return; }

        let extras = "";
        document.querySelectorAll('.doc-input').forEach(i => {
            if(i.value.trim()) extras += `${i.dataset.type === 'Integrante' ? '👥' : '📄'} - ${i.dataset.type}: ${i.value}\n`;
        });

        let relatorio = `📂 *DIÁRIO DE OBRAS*\n\n📍 - Cidade: ${d('cidade')}\n📅 - Data: ${d('data')}\n👷 - Equipe: ${d('equipe')}\n⚒️ - Enc: ${d('encarregado')}\n${extras}\n📁 - Proj: ${d('projeto')}\n⚡ - Tensão: ${d('tensao')}\n⚙️ - Serviços: ${d('servicos')}\n\n📊 - Status: ${d('status')}\n`;
        if(d('status') === 'PARCIAL') relatorio += `🚧 - Pendência: ${d('obsParcial')}\n`;
        relatorio += `\n🔍 - Arquivos no ZIP: ${arquivos.length}`;

        zip.file("RELATORIO.txt", relatorio.replace(/\*/g, ''));
        for (let i = 0; i < arquivos.length; i++) {
            const ext = arquivos[i].name.split('.').pop();
            zip.file(`ANEXO_${i+1}.${ext}`, arquivos[i]);
        }

        try {
            const content = await zip.generateAsync({type: "blob"});
            const file = new File([content], `Relatorio_${d('equipe')}.zip`, {type: "application/zip"});

            if (navigator.share && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'Relatório Diário', text: relatorio });
            } else {
                throw new Error("Compartilhamento não suportado");
            }
        } catch (err) {
            alert("Erro ao compartilhar. O arquivo será baixado para você anexar manualmente.");
            // Backup Download
            zip.generateAsync({type:"blob"}).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `Relatorio_${d('equipe')}.zip`;
                link.click();
            });
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Erro", err));
    }
</script>
</body>
</html>
