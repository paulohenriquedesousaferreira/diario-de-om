<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Obras e Manutenção</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="ICONE.png" type="image/png">
    <link rel="stylesheet" href="style.css">

<body>
    <div class="container">
        <div class="header">
            <h1>Diário de Obras e Manutenção</h1>
        </div>
        <div class="content">

            <div class="grid-2">
                <div><label>Cidade:</label><input type="text" id="cidade" value="Águas Lindas"></div>
                <div><label>Data:</label><input type="date" id="data"></div>
            </div>

            <div class="section-title">Equipe & Projeto</div>
            <div class="grid-2">
                <div>
                    <label>Equipe:</label>
                    <select id="equipe" onchange="preencherEquipe()">
                        <option value="">Selecione</option>
                        <option>AGLO001M</option>
                        <option>AGLO002M</option>
                        <option>AGLO003M</option>
                        <option>AGLO004M</option>
                        <option>AGLO005M</option>
                        <option>AGLO006M</option>
                        <option>AGLV001M</option>
                        <option>AGLB001M</option>
                        <option>AGLV002M</option>
                        <option>AGLV003M</option>
                        <option>AGLP001M</option>
                    </select>
                </div>
                <div><label>Nº Projeto:</label><input type="text" id="projeto" placeholder="0000"></div>
            </div>

            <label>Encarregado:</label>
            <select id="encarregado">
                <option value="">Selecione</option>
                <option>MOURES SANTANA GONÇALVES DE ABREU</option>
                <option>JOSE LUIZ DE MELO SOUZA</option>
                <option>JOÃO PAULO TEXEIRA NASCIMENTO</option>
                <option>LAZARO JOSE DO CARMO NASCIMENTO</option>
                <option>MOISES VANIR LEITE DA SILVA</option>
                <option>JOÃO BATISTA RODRIGUES DA SILVA</option>
                <option>JOSUEL AFONSO ALVES</option>
                <option>ELIAVAM PATRICIO</option>
                <option>JOÃO ALVES NOGUEIRA</option>
                <option>JOSE CARVALHO SOUZA</option>
                <option>CLAUDEMIR FRANCISCO DOS SANTOS</option>
                <option>ANTONIO JARDSON SILVA LIMA</option>
                <option>SEM2</option>
            </select><BR><BR>

            <label>Integrantes da Equipe:</label>
            <div class="doc-group" id="group-integrantes">
                <div class="container-inputs"></div>
                <button class="btn-add" onclick="addInput('group-integrantes', 'Integrante')">+ ADD INTEGRANTE</button>
            </div>

            <div class="section-title">Documentação Técnica</div>
            <label>Classe de Tensão:</label>
            <select id="tensao">
                <option>BT</option>
                <option>13.8KV</option>
                <option>34.5KV</option>
                <option>BT - 13.8KV</option>
                <option>BT - 34.5KV</option>
            </select>
            <BR><BR>

            <div class="grid-2">
                <div class="doc-group" id="group-SI">
                    <div class="container-inputs"></div><button class="btn-add" onclick="addInput('group-SI', 'SI')">+
                        SI</button>
                </div>
                <div class="doc-group" id="group-PTP">
                    <div class="container-inputs"></div><button class="btn-add" onclick="addInput('group-PTP', 'PTP')">+
                        PTP</button>
                </div>
            </div>
            <div class="grid-2">
                <div class="doc-group" id="group-OC">
                    <div class="container-inputs"></div><button class="btn-add" onclick="addInput('group-OC', 'OC')">+
                        OC</button>
                </div>
                <div class="doc-group" id="group-OSE">
                    <div class="container-inputs"></div><button class="btn-add" onclick="addInput('group-OSE', 'OSE')">+
                        OSE</button>
                </div>
            </div>
            <div class="doc-group" id="group-OS">
                <div class="container-inputs"></div>
                <button class="btn-add" onclick="addInput('group-OS', 'Ordem de Serviço')">+ ORDEM DE SERVIÇO</button>
            </div>

            <div class="status-box">
                <label>Status:</label>
                <select id="status" onchange="toggleParcial()">
                    <option value="CONCLUÍDO">✅ CONCLUÍDO</option>
                    <option value="PARCIAL">⚠️ PARCIAL</option>
                </select>
                <div id="descParcial" class="hidden">
                    <label>Pendência:</label>
                    <textarea id="obsParcial" rows="2"></textarea>
                </div>
            </div>

            <label>Serviços:</label>
            <textarea id="servicos" rows="3"></textarea>

            <label>Observação Final:</label>
            <textarea id="obsFinal" rows="2" placeholder="Alguma observação importante..."></textarea>

            <label>Mídia (Foto/Vídeo):</label>
            <div class="file-input-wrapper">
                <input type="file" id="midia" multiple accept="image/*,video/*">
            </div>

            <button class="btn-send" onclick="gerarEEnviar()"> 📋 REPORTAR</button>
        </div>
    </div>
